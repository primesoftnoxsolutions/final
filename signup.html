<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | NovaCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" aria-labelledby="signup-title">
      <h1 id="signup-title">Create Account</h1>
      <p>NovaCraft par account bana kar apna project journey start karein.</p>

      <form id="signupForm" class="auth-form" novalidate>
        <div class="input-group">
          <label for="signupName">Full Name</label>
          <input id="signupName" name="name" type="text" autocomplete="name" required />
        </div>

        <div class="input-group">
          <label for="signupEmail">Email Address</label>
          <input id="signupEmail" name="email" type="email" autocomplete="email" required />
        </div>

        <div class="input-group">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" name="password" type="password" minlength="6" autocomplete="new-password" required />
        </div>

        <div class="input-group">
          <label for="signupConfirmPassword">Confirm Password</label>
          <input id="signupConfirmPassword" name="confirmPassword" type="password" minlength="6" autocomplete="new-password" required />
        </div>

        <button class="btn btn-primary" type="submit">Sign Up</button>
      </form>

      <p id="signupMessage" class="form-message" role="status" aria-live="polite"></p>

      <p class="auth-foot">Already have an account? <a href="signin.html">Sign In</a></p>
      <p class="auth-foot"><a href="index.html">Back to Home</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
